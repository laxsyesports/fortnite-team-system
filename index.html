<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Fortnite Team System</title>

<!-- CryptoJS追加 -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.min.js"></script>

<style>
.hidden { display: none; }
.spinner {
  width: 30px;
  height: 30px;
  border: 4px solid #ccc;
  border-top: 4px solid #333;
  border-radius: 50%;
  animation: spin 1s linear infinite;
}
@keyframes spin {
  100% { transform: rotate(360deg); }
}
</style>
</head>

<body>

<h1>Fortnite Team System</h1>

<div id="login">
  <input id="username" placeholder="ユーザー名"><br>
  <input id="password" type="password" placeholder="パスワード"><br>
  <button id="loginBtn" onclick="login()">ログイン</button>

  <div id="loading" class="hidden">
    <div class="spinner"></div>
    <p>ログイン中です...</p>
  </div>

  <p id="loginError" style="color:red;"></p>
</div>

<div id="dashboard" class="hidden">
  <h2>ダッシュボード</h2>
  <p id="welcome"></p>
  <button onclick="logout()">ログアウト</button>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { 
  getFirestore, 
  collection, 
  query, 
  where,

} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAVPOyHZLdID59cpOqwXYZSlrLmPpXXmKo",
  authDomain: "fortnite-team-system.firebaseapp.com",
  projectId: "fortnite-team-system"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.login = async function() {

  const btn = document.getElementById("loginBtn");
  const loading = document.getElementById("loading");
  const errorText = document.getElementById("loginError");

  btn.disabled = true;
  loading.classList.remove("hidden");
  errorText.innerText = "";

  try {

    const username = document.getElementById("username").value.trim();
    const password = document.getElementById("password").value.trim();

    if (!username || !password) {
      throw new Error("入力してください");
    }

    const hash = CryptoJS.SHA256(password).toString();

    if (snapshot.empty) {
      throw new Error("ユーザーが存在しません");
    }

    let loginSuccess = false;

    snapshot.forEach((doc) => {
      const data = doc.data();

      }
    });

    if (!loginSuccess) {

    // ログイン成功
