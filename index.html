<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Fortnite Team System</title>

  <!-- CryptoJS -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>

  <style>
    body { font-family: Arial; text-align:center; margin-top:50px; }
    .hidden { display:none; }
    button { padding:8px 20px; margin-top:10px; }
  </style>
</head>
<body>

<h1>Fortnite Team System</h1>

<div id="login">
  <input id="username" placeholder="ユーザー名"><br><br>
  <input id="password" type="password" placeholder="パスワード"><br><br>
  <button onclick="login()">ログイン</button>
  <p id="loginError" style="color:red;"></p>
</div>

<div id="dashboard" class="hidden">
  <h2>ダッシュボード</h2>
  <p id="welcome"></p>
  <button onclick="logout()">ログアウト</button>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { 
  getFirestore, 
  collection, 
  query, 
  where, 
  getDocs 
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAVPOyHZLdID59cpOqwXYZSlrLmPpXXmKo",
  authDomain: "fortnite-team-system.firebaseapp.com",
  projectId: "fortnite-team-system",
  storageBucket: "fortnite-team-system.firebasestorage.app",
  messagingSenderId: "239748043839",
  appId: "1:239748043839:web:ff4edfca0c19043e5ad48a",
  measurementId: "G-P00239K9BL"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.login = async function() {

  const username = document.getElementById("username").value.trim();
  const password = document.getElementById("password").value.trim();
  const errorText = document.getElementById("loginError");

  errorText.innerText = "";

  if (!username || !password) {
    errorText.innerText = "入力してください";
    return;
  }

  try {

    const hash = CryptoJS.SHA256(password).toString();

    const q = query(
      collection(db, "Users"),
      where("username", "==", username)
    );

    const snapshot = await getDocs(q);

    console.log("取得件数:", snapshot.size);

    if (snapshot.empty) {
      errorText.innerText = "ユーザーが存在しません";
      return;
    }

    let success = false;

    snapshot.forEach(doc => {
      const data = doc.data();
      console.log("DB hash:", data.passwordHash);
      console.log("入力 hash:", hash);

      if (data.passwordHash === hash) {
        success = true;
      }
    });

    if (!success) {
      errorText.innerText = "パスワードが違います";
      return;
    }

    // ログイン成功
    document.getElementById("login").classList.add("hidden");
    document.getElementById("dashboard").classList.remove("hidden");
    document.getElementById("welcome").innerText = "ようこそ " + username;

  } catch (error) {
    console.error(error);
    errorText.innerText = "エラーが発生しました";
  }
};

window.logout = function() {
  location.reload();
};

</script>

</body>
</html>
